name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Check server syntax
        run: node --check server.js

      - name: Check application modules
        run: |
          node --check src/config/appConfig.js
          node --check src/services/database.js
          node --check src/services/cryptoService.js
